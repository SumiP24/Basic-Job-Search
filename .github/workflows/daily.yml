name: Daily job scrape

on:
  schedule:
    - cron: "0 5 * * *"
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  scrape:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install -r requirements.txt

      - name: Run scraper
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CV_TEXT: ${{ secrets.CV_TEXT }}
          ADZUNA_APP_ID: ${{ secrets.ADZUNA_APP_ID }}
          ADZUNA_APP_KEY: ${{ secrets.ADZUNA_APP_KEY }}
          JOOBLE_KEY: ${{ secrets.JOOBLE_KEY }}
        run: python -m scraper.main

      - name: Commit results
        run: |
          git config user.name "job-radar-bot"
          git config user.email "actions@users.noreply.github.com"
          git add docs/jobs.json data/score_cache.json
          git diff --cached --quiet || git commit -m "Job update $(date -u +%F)"
          git push
